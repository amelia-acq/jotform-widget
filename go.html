<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #555;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <p>Opening form&hellip;</p>
  <script>
    // ── Read the location from the URL parameter ──────────────────────
    var params = new URLSearchParams(window.location.search);
    var location = params.get("location");

    // ── Save to localStorage so the widget can read it ────────────────
    if (location) {
      localStorage.setItem("prefillLocation", location);
      localStorage.setItem("prefillLocationTime", Date.now().toString());
    }

    // ── Redirect to the JotForm app ───────────────────────────────────
    window.location.replace("https://www.jotform.com/app/261318687658876");
  </script>
</body>
</html>
